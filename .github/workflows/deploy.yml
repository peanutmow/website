name: Deploy via SFTP
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Uberspace
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          DEPLOY_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SFTP_PORT -H $SFTP_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p $SFTP_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='*.yml' \
            --delete \
            ./ $SFTP_USERNAME@$SFTP_HOST:/var/www/virtual/$SFTP_USERNAME/html/
