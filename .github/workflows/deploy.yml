name: Deploy via SFTP
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Uberspace via SFTP
        uses: pressable/action-scp@v2
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          privateKey: ${{ secrets.SFTP_PRIVATE_KEY }}
          source: "./"
          target: "/var/www/virtual/${{ secrets.SFTP_USERNAME }}/html/"
          recurse: true
          delete: true
          exclude: |
            .git/*
            .github/*
            node_modules/*
            *.md
            *.yml
            .gitignore
